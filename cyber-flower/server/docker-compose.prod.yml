version: '3.8'
services:
  api:
    build: .
    ports: ['3000:3000']
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGODB_URI=${MONGODB_URI}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - WX_APPID=${WX_APPID}
      - WX_SECRET=${WX_SECRET}
      - AI_LLM_ENDPOINT=${AI_LLM_ENDPOINT}
      - AI_LLM_API_KEY=${AI_LLM_API_KEY}
      - AI_IMAGE_ENDPOINT=${AI_IMAGE_ENDPOINT}
      - AI_IMAGE_API_KEY=${AI_IMAGE_API_KEY}
      - COS_SECRET_ID=${COS_SECRET_ID}
      - COS_SECRET_KEY=${COS_SECRET_KEY}
      - COS_BUCKET=${COS_BUCKET}
      - COS_REGION=${COS_REGION}
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://localhost:3000/health',r=>{process.exit(r.statusCode===200?0:1)})"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits: { memory: '512M', cpus: '1' }
        reservations: { memory: '256M', cpus: '0.5' }
    logging:
      driver: 'json-file'
      options: { max-size: '10m', max-file: '3' }

  mongo:
    image: mongo:7
    restart: always
    volumes: ['mongo_data:/data/db']
    environment:
      MONGO_INITDB_DATABASE: cyber-bloom
    deploy:
      resources: { limits: { memory: '512M' } }

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes: ['redis_data:/data']

volumes:
  mongo_data:
  redis_data:
