version: '3.8'
services:
  api:
    build: .
    ports: ['3000:3000']
    environment:
      - NODE_ENV=development
      - MONGODB_URI=mongodb://mongo:27017/cyber-bloom
      - REDIS_URL=redis://redis:6379
    depends_on: [mongo, redis]
    volumes: ['./src:/app/src']
    command: npm run start:dev

  mongo:
    image: mongo:7
    ports: ['27017:27017']
    volumes: ['mongo_data:/data/db']

  redis:
    image: redis:7-alpine
    ports: ['6379:6379']

volumes:
  mongo_data:
